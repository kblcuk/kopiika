[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[env]
_.fnox-env = { tools = true }

[tools]
age = "latest"
fnox = "latest"
gradle = "8.14.4"
java = "21"
ruby = "latest"

# --- Release tasks ---
# mise is the single implementation layer for release commands.
# Bun keeps app/dev/versioning commands; deployment and store orchestration live here.

[tasks."ios:doctor"]
description = "Validate App Store Connect credentials for the current iOS version"
run = "bundle exec fastlane ios doctor"

[tasks."ios:setup"]
description = "Sync iOS development and App Store signing assets via match"
run = "bundle exec fastlane ios setup_signing"

[tasks."ios:build"]
description = "Build an iOS archive using the current app.json version metadata"
run = "bundle exec fastlane ios build"

[tasks."ios:upload"]
description = "Upload the latest iOS build to TestFlight without rebuilding"
run = "bundle exec fastlane ios upload"

[tasks."ios:promote:external"]
description = "Promote an uploaded TestFlight build to external tester groups"
run = "bundle exec fastlane ios promote_external"

[tasks."ios:beta"]
description = "Build and upload iOS beta to TestFlight"
run = "bundle exec fastlane ios beta"

[tasks."ios:cleanup"]
description = "Expire old TestFlight builds"
run = "bundle exec fastlane ios cleanup"

[tasks."android:build:release"]
description = "Build Android release bundle (.aab)"
run = "bundle exec fastlane android build"

[tasks."android:doctor"]
description = "Validate Google Play credentials and package access"
run = "bundle exec fastlane android doctor"

[tasks."android:upload"]
description = "Upload an Android bundle to Google Play"
run = "bundle exec fastlane android upload"

[tasks."android:beta"]
description = "Build and upload Android beta to internal track"
run = "bundle exec fastlane android beta"

[tasks."android:production"]
description = "Build and upload Android production release"
run = "bundle exec fastlane android production"

[tasks."android:promote"]
description = "Promote an existing Android release between Play tracks"
run = "bundle exec fastlane android promote"

[tasks."android:cleanup"]
description = "Prune old Google Play track releases"
run = "bundle exec fastlane android cleanup"

[tasks."release:doctor"]
description = "Run iOS and Android release preflight checks"
run = ["bundle exec fastlane ios doctor", "bundle exec fastlane android doctor"]

[tasks."release:sync-build-numbers"]
description = "Sync app.json build numbers from App Store Connect and Google Play"
run = "bundle exec fastlane sync_build_numbers"

[tasks."release:notify"]
description = "Send Telegram release notification"
run = "bundle exec fastlane notify_telegram"

[tasks."release:cleanup-builds"]
description = "Clean up old TestFlight builds and stale Play track releases"
run = ["bundle exec fastlane ios cleanup", "bundle exec fastlane android cleanup"]

[tasks."release:beta"]
description = "Ship iOS + Android betas in parallel, then notify Telegram"
run = [
	{ tasks = [
		"ios:beta",
		"android:beta",
	] },
	"bundle exec fastlane notify_telegram platform:'iOS + Android (Beta)'",
]

[tasks."release:production"]
description = "Ship iOS beta + Android production in parallel, then notify Telegram"
run = [
	{ tasks = [
		"ios:beta",
		"android:production",
	] },
	"bundle exec fastlane notify_telegram platform:'iOS + Android (Production)'",
]
