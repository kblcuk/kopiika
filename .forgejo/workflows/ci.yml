name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: docker
    container:
      image: oven/bun:1
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - uses: https://code.forgejo.org/actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: modules-${{ hashFiles('bun.lock') }}

      - name: Install
        if: steps.cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Format
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Types
        run: bun run types

      - name: Unit tests
        run: bun run test:unit
